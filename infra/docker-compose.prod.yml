version: "3.9"

# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    command: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
      --timeout 30
      --graceful-timeout 10
      --access-logfile -
    environment:
      - CERBERUS_LOG_LEVEL=info
      - CERBERUS_CORS_ORIGINS=https://your-domain.com
    ports: []  # no direct exposure — nginx handles it
    volumes: []  # no source mounts in prod

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: production
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    ports: []  # behind nginx
    volumes: []

  redis:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 640M
        reservations:
          memory: 256M
    ports: []  # internal only

  postgres:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 512M
    ports: []  # internal only
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}

  prometheus:
    ports: []  # internal only
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  grafana:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    networks:
      - cerberus
