name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/
      - run: ruff format --check app/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install fastapi "uvicorn[standard]" gunicorn "redis[hiredis]" \
            "sqlalchemy[asyncio]" asyncpg alembic pydantic pydantic-settings \
            prometheus-client prometheus-fastapi-instrumentator structlog \
            pytest pytest-asyncio httpx "fakeredis[lua]"
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short
      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short
      - name: Run e2e tests
        run: python -m pytest tests/e2e/ -v --tb=short

  # ── Frontend ─────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint
